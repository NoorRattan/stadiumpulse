name: Deploy Keep-Alive Worker

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Validate keep-alive Worker
        run: node --check keep-alive-worker/src/index.mjs

      - name: Deploy Cloudflare Cron Trigger
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config keep-alive-worker/wrangler.toml
