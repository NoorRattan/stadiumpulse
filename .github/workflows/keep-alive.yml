name: Keep Render Warm

on:
  schedule:
    # Render's free web services idle after roughly 15 minutes. Keep both the
    # process and its database path warm for evaluator and demo traffic.
    # Offset the ten-minute cadence from common minute boundaries because
    # GitHub may delay or drop scheduled runs during peak scheduler load.
    - cron: "7,17,27,37,47,57 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Verify health and database-backed demo
        env:
          HEALTH_URL: ${{ secrets.RENDER_HEALTH_URL }}
        run: |
          set -euo pipefail
          curl --fail --show-error --silent "$HEALTH_URL"
          BASE_URL="${HEALTH_URL%/health}"
          curl --fail --show-error --silent "$BASE_URL/api/demo" --output demo.json
          python -c "import json; data=json.load(open('demo.json')); assert data['databaseStatus'] == 'connected'"
