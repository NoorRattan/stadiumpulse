name: Deploy

on:
  push:
    branches: [main]

# Prevent concurrent deploys — a new push cancels any in-progress run.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: github-actions-deploy@stadiumpulse-wc26.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy stadiumpulse-api \
            --source backend/ \
            --project stadiumpulse-wc26 \
            --region us-central1 \
            --set-env-vars ENVIRONMENT=production,GCP_PROJECT_ID=stadiumpulse-wc26,ALLOWED_ORIGINS=https://stadiumpulse-wc26.web.app,VERTEX_AI_LOCATION=us-central1,GEMINI_MODEL_PRIMARY=gemini-2.5-flash,GEMINI_MODEL_LITE=gemini-2.5-flash-lite,LOG_LEVEL=INFO \
            --allow-unauthenticated

  deploy-frontend:
    needs: deploy-backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # action-hosting-deploy writes preview-URL comments

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        run: cd frontend && npm ci && npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: stadiumpulse-wc26
          channelId: live
