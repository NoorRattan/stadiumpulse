name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r requirements.txt

      - name: Audit production dependencies
        run: pip install pip-audit==2.10.1 && pip-audit --requirement requirements-prod.txt

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Tests with coverage
        run: pytest --cov=. --cov-fail-under=100
        env:
          ENVIRONMENT: test
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_DB_URL: postgresql://postgres:postgres@localhost:5432/postgres
          SUPABASE_JWT_SECRET: test-secret-for-ci-only-at-least-32-bytes
          GROQ_API_KEY: test-key
          GROQ_MODEL_PRIMARY: llama-3.1-8b-instant
          GROQ_MODEL_LITE: llama-3.1-8b-instant
          ALLOWED_ORIGINS: http://localhost:5173
          LOG_LEVEL: WARNING

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Audit production dependencies
        run: npm run audit:prod

      - run: npx eslint .

      - run: npx prettier --check .

      - name: Check contrast tokens
        run: npm run contrast:check

      - run: npx vitest run

      - run: npx tsc --noEmit

      - run: npm run build
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: test-anon-key
          VITE_API_BASE_URL: https://api.example.com

      - name: Enforce bundle budgets
        run: npm run bundle:check

      - name: Install browser engines
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Cross-browser accessibility and responsive tests
        run: npm run test:e2e

  deploy-backend:
    needs: backend-test
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: |
          curl \
            --fail \
            --show-error \
            --silent \
            --connect-timeout 10 \
            --max-time 30 \
            --retry 3 \
            --retry-all-errors \
            --request POST \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  deploy-keep-alive:
    needs: backend-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Validate keep-alive Worker
        run: node --check keep-alive-worker/src/index.mjs

      - name: Deploy Cloudflare Cron Trigger
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config keep-alive-worker/wrangler.toml

  deploy-frontend:
    # Frontend deployment is independently verified and must not be blocked by
    # a Render control-plane outage affecting the backend deploy hook.
    needs: frontend-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: cd frontend && npm ci && npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_ENABLE_GOOGLE_AUTH: ${{ secrets.VITE_ENABLE_GOOGLE_AUTH }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=stadiumpulse
