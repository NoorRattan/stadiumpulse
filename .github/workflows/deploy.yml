name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r requirements.txt

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Tests with coverage
        run: pytest --cov=. --cov-fail-under=100
        env:
          ENVIRONMENT: test
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_DB_URL: postgresql://postgres:postgres@localhost:5432/postgres
          SUPABASE_JWT_SECRET: test-secret-for-ci-only
          GEMINI_API_KEY: test-key
          GEMINI_MODEL_PRIMARY: gemini-2.5-flash
          GEMINI_MODEL_LITE: gemini-2.5-flash-lite
          ALLOWED_ORIGINS: http://localhost:5173
          LOG_LEVEL: WARNING

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npx eslint .

      - run: npx prettier --check .

      - run: npx vitest run

      - run: npx tsc --noEmit

      - run: npm run build
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: test-anon-key
          VITE_API_BASE_URL: https://api.example.com

  deploy-backend:
    needs: backend-test
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: |
          curl --fail --show-error --silent --request POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  deploy-frontend:
    needs: [frontend-test, deploy-backend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: cd frontend && npm ci && npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=stadiumpulse
